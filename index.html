<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Shop</title>
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="logo">
          <a href="#">
            <img src="images/logogreenshop.svg" alt="Logo" />
            <img src="images/logotext.svg" alt="Logo text" />
          </a>
        </div>

        <nav>
          <ul>
            <li><a href="#home" class="active">Home</a></li>
            <li><a href="#shop">Shop</a></li>
            <li><a href="#plant_care">Plant Care</a></li>
            <li><a href="#blogs">Blogs</a></li>
          </ul>
        </nav>

        <div class="loginBtn">
          <a href="registration.html">
            <img src="images/loginBtn.svg" alt="Login" />
          </a>
        </div>
      </div>
    </header>

    <main>
      <section id="home" class="mainBanner">
        <div class="container">
          <div class="bannerTxt">
            <p class="subtitleTxt">Welcome to GreenShop</p>
            <h1>
              Let’s Make a <br />
              Better <span class="greenTxt">Planet</span>
            </h1>
            <p>
              We are an online plant shop offering a wide range of cheap and
              trendy plants. Use our plants to create an unique Urban Jungle.
              Order your favorite plants!
            </p>
            <a href="#" class="shopnowBtn">
              <img src="images/shopnowBtn.svg" alt="Shop Now" />
            </a>
          </div>

          <div class="bannerImg">
            <img src="images/img-banner.png" alt="Plant" />
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
